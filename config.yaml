analysis:
  # AUTO-RESOLVE IS DISABLED — Wibey will present findings and proposed actions but NEVER
  # execute clearTaskInstances, PATCH taskInstances, gsutil cp, or any mutating command
  # without explicit engineer approval in that conversation turn.
  # Change to true only after confirming the auto-resolve pattern is safe for the specific error type.
  auto_resolve: false

  # Cluster UI endpoints — fetch dynamically with:
  #   gcloud dataproc clusters describe <cluster> --project=<proj> --region=<region> \
  #     --format="yaml(config.endpointConfig.httpPorts)"
  # WARNING: ephemeral cluster URLs change on every cluster recreation. Use PHS for post-deletion access.

  # DCC cluster (ldat-dcc-masterworkflow-gcp-ca) — current URLs, will change when cluster recreates
  dcc_cluster:
    jupyter_labs_url: "https://dljbbexw3jgm3bjyz6vixwr34u-dot-us-central1.dataproc.googleusercontent.com/gateway/default/jupyter/lab/"
    spark_history_url: "https://dljbbexw3jgm3bjyz6vixwr34u-dot-us-central1.dataproc.googleusercontent.com/sparkhistory/"
    yarn_url: "https://dljbbexw3jgm3bjyz6vixwr34u-dot-us-central1.dataproc.googleusercontent.com/yarn/"

  # Persistent History Server (PHS) — always available, use when ephemeral cluster is gone
  # Cluster: intcamdseprd-prod-2-1-dpaas-phs | project: wmt-bfdms-intcamdseprd | region: us-central1
  phs_cluster:
    spark_history_url: "https://bsf7vmla7jhxln4ittnzcfti5u-dot-us-central1.dataproc.googleusercontent.com/sparkhistory/"
    yarn_url: "https://bsf7vmla7jhxln4ittnzcfti5u-dot-us-central1.dataproc.googleusercontent.com/yarn/"
    mapreduce_history_url: "https://bsf7vmla7jhxln4ittnzcfti5u-dot-us-central1.dataproc.googleusercontent.com/jobhistory/"

  # Scope of auto-resolution actions (only applies when auto_resolve: true above)
  # All scopes are effectively disabled while auto_resolve: false
  auto_resolve_scope:
    airflow: false   # clearTaskInstances, PATCH taskInstances — requires engineer approval
    config: false    # edit YAML/config files — requires engineer approval
    cluster: false   # Dataproc / GCP resources — requires engineer approval
    jira: false      # raise Jira tickets — requires engineer approval
